<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARTEND — Reservierungen</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 2rem; }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        th, td { padding: .75rem 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #fafafa; font-weight: 600; font-size: .85rem; text-transform: uppercase; color: #666; }
        .status { display: inline-block; padding: .2rem .6rem; border-radius: 12px; font-size: .8rem; font-weight: 500; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-reminder_sent { background: #cce5ff; color: #004085; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .status-no_show { background: #e2e3e5; color: #383d41; }
        .status-completed { background: #d1ecf1; color: #0c5460; }
        .empty { padding: 2rem; text-align: center; color: #999; }
    </style>
</head>
<body>
    <h1>Reservierungen — Heute & kommende</h1>
    <div id="bookings-container"
         hx-get="/dashboard/bookings-table"
         hx-trigger="every 5s"
         hx-swap="innerHTML">
        {% include "partials/bookings_table.html" %}
    </div>
</body>
</html>
